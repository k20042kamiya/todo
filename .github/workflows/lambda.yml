# lambda.yml
#
# 【必要な GitHub Secrets / Variables】
# Secrets:
#   AWS_ROLE_ARN           - OIDC用IAMロールARN
# Variables:
#   AWS_REGION             - AWSリージョン (例: ap-northeast-1)
#   ECR_REPOSITORY_LAMBDA  - Lambda用ECRリポジトリ名 (例: todo-lambda)
#   LAMBDA_FUNCTION_NAME   - Lambda関数名 (例: todo-notification-batch)
#
# 【AWS側の事前設定】
# 1. IAM OIDC プロバイダー設定 (backend.ymlと共通)
# 2. IAMロールに付与するポリシー: AmazonEC2ContainerRegistryPowerUser, AWSLambda_FullAccess
# 3. Lambda関数はコンテナイメージで作成済みであること
#
# 【ビルドコンテキストについて】
# Dockerfile.batch は backend/ にあるが、ビルドコンテキストは lambda/ を使用する
# (Dockerfile.batch のコメント参照)

name: Lambda CI/CD

on:
  push:
    paths:
      - "lambda/**"
      - "backend/Dockerfile.batch"
      - ".github/workflows/lambda.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: lambda/go.mod
          cache-dependency-path: lambda/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

  build-and-push:
    name: Build & Push to ECR
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY_LAMBDA }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # ビルドコンテキストは lambda/、Dockerfileは backend/Dockerfile.batch
          docker build \
            --cache-from "$REGISTRY/$REPOSITORY:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -f backend/Dockerfile.batch \
            -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$REPOSITORY:latest" \
            ./lambda

          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"

          echo "image-uri=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy Lambda
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update Lambda function code
        env:
          FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME }}
          IMAGE_URI: ${{ needs.build-and-push.outputs.image-uri }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          aws lambda update-function-code \
            --region "$AWS_REGION" \
            --function-name "$FUNCTION_NAME" \
            --image-uri "$IMAGE_URI" \
            --query "FunctionArn" \
            --output text

          echo "Waiting for Lambda update to complete..."

          aws lambda wait function-updated \
            --region "$AWS_REGION" \
            --function-name "$FUNCTION_NAME"

          # デプロイ後の状態確認
          STATE=$(aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query "State" \
            --output text)

          if [ "$STATE" != "Active" ]; then
            echo "::error::Lambda function is not Active (State: $STATE)"
            exit 1
          fi

          echo "Lambda deploy succeeded! (State: $STATE)"
