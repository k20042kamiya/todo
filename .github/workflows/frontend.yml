# frontend.yml
#
# 【必要な GitHub Secrets / Variables】
# Secrets:
#   AWS_ROLE_ARN               - OIDC用IAMロールARN
# Variables:
#   AWS_REGION                 - AWSリージョン (例: ap-northeast-1)
#   S3_BUCKET_FRONTEND         - フロントエンド配信用S3バケット名
#   CLOUDFRONT_DISTRIBUTION_ID - CloudFrontディストリビューションID
#   VITE_FIREBASE_API_KEY      - Firebase APIキー
#   VITE_FIREBASE_AUTH_DOMAIN  - Firebase Auth Domain (例: todo-xxxx.firebaseapp.com)
#   VITE_FIREBASE_PROJECT_ID   - Firebase プロジェクトID
#
# 【AWS側の事前設定】
# 1. IAM OIDC プロバイダー設定 (backend.ymlと共通)
# 2. IAMロールに付与するポリシー:
#    以下のカスタムインラインポリシー (S3 + CloudFront 最小権限):
#      {
#        "Version": "2012-10-17",
#        "Statement": [
#          {
#            "Effect": "Allow",
#            "Action": ["s3:PutObject", "s3:DeleteObject", "s3:GetObject", "s3:ListBucket"],
#            "Resource": [
#              "arn:aws:s3:::<S3_BUCKET_FRONTEND>",
#              "arn:aws:s3:::<S3_BUCKET_FRONTEND>/*"
#            ]
#          },
#          {
#            "Effect": "Allow",
#            "Action": ["cloudfront:CreateInvalidation", "cloudfront:GetInvalidation"],
#            "Resource": "arn:aws:cloudfront::<ACCOUNT_ID>:distribution/<CLOUDFRONT_DISTRIBUTION_ID>"
#          }
#        ]
#      }

name: Frontend CI/CD

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ vars.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ vars.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_API_BASE_URL=/api/v1" >> .env

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist
          retention-days: 1

  deploy:
    name: Deploy to S3 + CloudFront
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: dist

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET_FRONTEND }}
        run: |
          # HTMLはキャッシュさせない、JSやCSSはcontentハッシュ付きなので長期キャッシュ
          aws s3 sync dist/ "s3://$S3_BUCKET" \
            --delete \
            --cache-control "no-cache" \
            --exclude "assets/*"

          aws s3 sync dist/assets/ "s3://$S3_BUCKET/assets" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)

          echo "Invalidation ID: $INVALIDATION_ID"
          echo "Waiting for invalidation to complete..."

          aws cloudfront wait invalidation-completed \
            --distribution-id "$DISTRIBUTION_ID" \
            --id "$INVALIDATION_ID"

          echo "CloudFront cache invalidated!"
