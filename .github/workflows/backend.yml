# backend.yml
#
# 【必要な GitHub Secrets / Variables】
# Secrets:
#   AWS_ROLE_ARN           - OIDC用IAMロールARN (例: arn:aws:iam::123456789:role/github-actions-role)
# Variables:
#   AWS_REGION             - AWSリージョン (例: ap-northeast-1)
#   ECR_REPOSITORY_BACKEND - ECRリポジトリ名 (例: todo-backend)
#   ECS_CLUSTER_NAME       - ECSクラスター名 (例: todo-cluster)
#   ECS_SERVICE_NAME       - ECSサービス名 (例: todo-api)
#   ECS_TASK_DEFINITION    - ECSタスク定義のfamily名 (例: todo-api)
#   ECS_CONTAINER_NAME     - コンテナ名 (例: api)
#
# 【AWS側の事前設定】
# 1. IAM OIDC プロバイダーを作成:
#    URL: https://token.actions.githubusercontent.com
#    Audience: sts.amazonaws.com
# 2. IAMロールの信頼ポリシーに以下を追加:
#    {
#      "Effect": "Allow",
#      "Principal": {"Federated": "arn:aws:iam::ACCOUNT_ID:oidc-provider/token.actions.githubusercontent.com"},
#      "Action": "sts:AssumeRoleWithWebIdentity",
#      "Condition": {
#        "StringEquals": {"token.actions.githubusercontent.com:aud": "sts.amazonaws.com"},
#        "StringLike": {"token.actions.githubusercontent.com:sub": "repo:YOUR_ORG/YOUR_REPO:ref:refs/heads/main"}
#      }
#    }
# 3. IAMロールに付与するポリシー:
#    - AmazonEC2ContainerRegistryPowerUser (ECRへのpush)
#    - ecs:RegisterTaskDefinition, ecs:UpdateService, ecs:DescribeTaskDefinition, ecs:DescribeServices (ECSデプロイ)
#    - iam:PassRole (ECSタスク実行ロールのpass)

name: Backend CI/CD

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

permissions:
  id-token: write  # OIDC認証に必要
  contents: read

# 同一ブランチへの連続pushで前のジョブをキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -coverprofile=coverage.out ./...

  build-and-push:
    name: Build & Push to ECR
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY_BACKEND }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --cache-from "$REGISTRY/$REPOSITORY:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$REPOSITORY:latest" \
            ./backend

          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"

          echo "image-uri=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  migrate:
    name: DB Migration
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    outputs:
      task-def-arn: ${{ steps.register.outputs.task-def-arn }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # 新イメージを指すタスク定義リビジョンを先に登録する。
      # run-taskのoverridesではimageを差し替えられないため、
      # 最新リビジョン(=前回デプロイの旧イメージ)のまま起動すると
      # 新しいマイグレーションファイルが存在せず適用されない。
      - name: Register task definition with new image
        id: register
        env:
          TASK_FAMILY: ${{ vars.ECS_TASK_DEFINITION }}
          CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}
          IMAGE_URI: ${{ needs.build-and-push.outputs.image-uri }}
        run: |
          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query "taskDefinition" \
            | jq --arg NAME "$CONTAINER_NAME" --arg IMAGE "$IMAGE_URI" '
                .containerDefinitions |= map(
                  if .name == $NAME then .image = $IMAGE else . end
                )
                | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                      .compatibilities, .registeredAt, .registeredBy)')

          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "New task definition: $TASK_DEF_ARN"
          echo "task-def-arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Run DB migration on ECS
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER_NAME }}
          CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}
          TASK_DEF_ARN: ${{ steps.register.outputs.task-def-arn }}
          SUBNET_IDS: ${{ vars.ECS_MIGRATE_SUBNET_IDS }}
          SECURITY_GROUP_ID: ${{ vars.ECS_MIGRATE_SECURITY_GROUP_ID }}
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_IDS],securityGroups=[$SECURITY_GROUP_ID],assignPublicIp=ENABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"$CONTAINER_NAME\",\"command\":[\"./migrate\"]}]}" \
            --query "tasks[0].taskArn" \
            --output text)

          echo "Migration task: $TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --query "tasks[0].containers[0].exitCode" \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migration succeeded"

  deploy:
    name: Deploy to ECS Fargate
    needs: [build-and-push, migrate]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # migrateジョブが登録・検証済みのリビジョンをそのままサービスに適用する
      - name: Deploy to ECS service
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER_NAME }}
          SERVICE: ${{ vars.ECS_SERVICE_NAME }}
          TASK_DEF_ARN: ${{ needs.migrate.outputs.task-def-arn }}
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$TASK_DEF_ARN" \
            --query "service.taskDefinition" \
            --output text

          echo "Waiting for service stability..."
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE"
          echo "Deploy completed"
