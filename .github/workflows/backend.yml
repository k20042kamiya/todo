# backend.yml
#
# 【必要な GitHub Secrets / Variables】
# Secrets:
#   AWS_ROLE_ARN          - OIDC用IAMロールARN (例: arn:aws:iam::123456789:role/github-actions-role)
# Variables:
#   AWS_REGION            - AWSリージョン (例: ap-northeast-1)
#   ECR_REPOSITORY_BACKEND - ECRリポジトリ名 (例: todo-backend)
#   EC2_INSTANCE_ID       - デプロイ先EC2インスタンスID (例: i-0123456789abcdef0)
#
# 【AWS側の事前設定】
# 1. IAM OIDC プロバイダーを作成:
#    URL: https://token.actions.githubusercontent.com
#    Audience: sts.amazonaws.com
# 2. IAMロールの信頼ポリシーに以下を追加:
#    {
#      "Effect": "Allow",
#      "Principal": {"Federated": "arn:aws:iam::ACCOUNT_ID:oidc-provider/token.actions.githubusercontent.com"},
#      "Action": "sts:AssumeRoleWithWebIdentity",
#      "Condition": {
#        "StringEquals": {"token.actions.githubusercontent.com:aud": "sts.amazonaws.com"},
#        "StringLike": {"token.actions.githubusercontent.com:sub": "repo:YOUR_ORG/YOUR_REPO:ref:refs/heads/main"}
#      }
#    }
# 3. IAMロールに付与するポリシー: AmazonEC2ContainerRegistryPowerUser, AmazonSSMFullAccess
# 4. EC2インスタンスのIAMロールに付与するポリシー: AmazonSSMManagedInstanceCore, AmazonEC2ContainerRegistryReadOnly
# 5. EC2インスタンスに /etc/todo/api.env を配置 (DB接続情報などの環境変数)

name: Backend CI/CD

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

permissions:
  id-token: write  # OIDC認証に必要
  contents: read

# 同一ブランチへの連続pushで前のジョブをキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -coverprofile=coverage.out ./...

  build-and-push:
    name: Build & Push to ECR
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY_BACKEND }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --cache-from "$REGISTRY/$REPOSITORY:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$REPOSITORY:latest" \
            ./backend

          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"

          echo "image-uri=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production  # GitHub Environmentsによる承認フロー
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy via SSM (SSH不要・セキュア)
        env:
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          IMAGE_URI: ${{ needs.build-and-push.outputs.image-uri }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          # jqでJSONを組み立てて変数展開の安全性を確保
          PARAMS=$(jq -n \
            --arg registry "$REGISTRY" \
            --arg image_uri "$IMAGE_URI" \
            --arg region "$AWS_REGION" \
            '{commands: [
              ("aws ecr get-login-password --region " + $region + " | docker login --username AWS --password-stdin " + $registry),
              ("docker pull " + $image_uri),
              "docker stop todo-api || true",
              "docker rm todo-api || true",
              ("docker run -d --name todo-api --restart unless-stopped -p 8080:8080 --env-file /etc/todo/api.env " + $image_uri),
              "docker image prune -f"
            ]}')

          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # 完了まで待機 (最大20分)
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          # 実行結果の確認
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "::error::Deploy failed (status: $STATUS)"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi

          echo "Deploy succeeded!"
