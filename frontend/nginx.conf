server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ローカル開発: バックエンドAPIへのプロキシ
    # 本番(AWS)では CloudFront のビヘイビア設定で /api/* を ALB にルーティングする
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Vue Router の history モード対応
    location / {
        try_files $uri $uri/ /index.html;
    }
}
